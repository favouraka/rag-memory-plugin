name: Weekly Checks

on:
  schedule:
    # Run at midnight UTC every Monday
    - cron: '0 0 * * 1'
  workflow_dispatch:

# Define permissions at workflow level
permissions:
  contents: write
  issues: write

# Cancel in-progress runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'

jobs:
  # Comprehensive test suite
  full-test-suite:
    name: Full Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install ".[neural,dev]"
        pip install pytest-benchmark pytest-xdist

    - name: Run tests with coverage
      run: |
        pytest tests/ -v --cov=rag_memory --cov-report=html --cov-report=term || true

    - name: Run benchmark tests
      run: |
        pytest tests/ -k benchmark --benchmark-only --benchmark-json=benchmark.json || true

    - name: Upload benchmark results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: benchmark.json
        retention-days: 30

    - name: Upload coverage artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: htmlcov/
        retention-days: 30

  # Performance tests
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install ".[neural]"
        pip install pytest-benchmark

    - name: Run performance tests
      run: |
        python3 << 'EOF'
        import time
        import tempfile
        from pathlib import Path

        # Create test database
        from rag_memory.core import RAGCore

        with tempfile.TemporaryDirectory() as tmpdir:
            db_path = Path(tmpdir) / "test.db"
            rag = RAGCore(str(db_path))
            rag.initialize()

            # Benchmark document addition
            print("=== Performance Benchmarks ===")
            start = time.time()
            for i in range(100):
                rag.add_document(
                    content=f"Test document {i} with some content",
                    namespace="test"
                )
            add_time = time.time() - start
            print(f"Add 100 documents: {add_time:.3f}s ({add_time/100*1000:.2f}ms per doc)")

            # Benchmark TF-IDF search
            start = time.time()
            for _ in range(100):
                rag.search("test document", mode="tfidf")
            tfidf_time = time.time() - start
            print(f"TF-IDF search (100x): {tfidf_time:.3f}s ({tfidf_time/100*1000:.2f}ms per search)")

            # Get stats
            stats = rag.get_stats()
            print(f"\nDatabase stats: {stats}")

        print("\n=== Benchmarks Complete ===")
        EOF

  # Code quality report
  code-quality-report:
    name: Code Quality Report
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install analysis tools
      run: |
        pip install --upgrade pip
        pip install ruff black isort mypy pygount bandit

    - name: Count lines of code
      run: |
        pygount --format=summary src/rag_memory || true

    - name: Code complexity check
      run: |
        ruff check src/rag_memory --output-format=json > ruff-report.json || true
        cat ruff-report.json | python3 -m json.tool || true

    - name: Security scan with bandit
      run: |
        bandit -r src/rag_memory -f json -o bandit-report.json || true
        cat bandit-report.json | python3 -m json.tool || true

    - name: Upload quality reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: code-quality-reports
        path: |
          ruff-report.json
          bandit-report.json
        retention-days: 30

  # Dependency health check
  dependency-health:
    name: Dependency Health
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependency tools
      run: |
        pip install --upgrade pip
        pip install pipdeptree
        pip install ".[neural]"

    - name: Check dependency tree
      run: |
        pipdeptree -p rag-memory-plugin > dependency-tree.txt
        cat dependency-tree.txt

    - name: Check for circular dependencies
      run: |
        pipdeptree -p rag-memory-plugin --warn cycles || echo "No circular dependencies found"

    - name: Upload dependency tree
      uses: actions/upload-artifact@v4
      with:
        name: dependency-tree
        path: dependency-tree.txt
        retention-days: 30

  # Documentation completeness
  documentation-completeness:
    name: Documentation Completeness
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Check documentation coverage
      run: |
        python3 << 'EOF'
        from pathlib import Path

        # Check for required documentation files
        required_docs = {
            'README.md': 'Main documentation',
            'MIGRATION.md': 'Migration guide',
            'LICENSE': 'License',
            'pyproject.toml': 'Package metadata',
            'install.sh': 'Installation script',
            'migrate_to_new_venv.sh': 'Migration script'
        }

        missing = []
        for doc_file, description in required_docs.items():
            if not Path(doc_file).exists():
                missing.append(f"- {doc_file} ({description})")

        if missing:
            print("❌ Missing documentation files:")
            for m in missing:
                print(m)
        else:
            print("✅ All required documentation files present")

        # Check docstring coverage
        try:
            from rag_memory.cli import main
            if main.__doc__:
                print(f"✅ CLI has docstring")
            else:
                print("❌ CLI missing docstring")
        except Exception as e:
            print(f"⚠️  Could not check CLI docstring: {e}")
        EOF

  # Create weekly report
  weekly-report:
    name: Create Weekly Report
    runs-on: ubuntu-latest
    needs: [full-test-suite, performance-tests, code-quality-report]
    if: ${{ always() }}
    timeout-minutes: 5

    steps:
    - name: Create summary
      run: |
        echo "# 📊 Weekly Report Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Date:** $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Results" >> $GITHUB_STEP_SUMMARY
        echo "- Full test suite: ${{ needs.full-test-suite.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Performance tests: ${{ needs.performance-tests.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Code quality: ${{ needs.code-quality-report.result }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- Benchmark results: Available" >> $GITHUB_STEP_SUMMARY
        echo "- Coverage report: Available" >> $GITHUB_STEP_SUMMARY
        echo "- Code quality reports: Available" >> $GITHUB_STEP_SUMMARY
        echo "- Dependency tree: Available" >> $GITHUB_STEP_SUMMARY
