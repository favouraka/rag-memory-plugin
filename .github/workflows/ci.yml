name: CI/CD

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Define permissions at workflow level
permissions:
  contents: read
  pull-requests: write
  checks: write

# Cancel in-progress runs for same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Check Python compatibility across versions
  test-python-versions:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false  # Test all versions even if one fails
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'  # Cache pip dependencies

    - name: Get pip cache dir
      id: pip-cache
      run: |
        echo "dir=$(pip cache dir)" >> $GITHUB_OUTPUT

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ${{ steps.pip-cache.outputs.dir }}
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest ruff mypy click rich
        pip install pytest-cov pytest-benchmark

    - name: Check Python syntax
      run: |
        python -m py_compile src/rag_memory/**/*.py

    - name: Lint with ruff
      run: |
        ruff check src/rag_memory --output-format=github
      continue-on-error: true

    - name: Check code formatting with black
      run: |
        black --check src/rag_memory --target-version py311
      continue-on-error: true

    - name: Type check with mypy
      run: |
        mypy src/rag_memory --ignore-missing-imports || true

    - name: Install package in editable mode
      run: |
        pip install -e ".[neural,dev]"

    - name: Run tests
      run: |
        pytest tests/ -v --cov=rag_memory --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      if: always()
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

  # Test package installation
  test-installation:
    name: Test Installation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install from source
      run: |
        pip install --upgrade pip
        pip install ".[neural]"

    - name: Verify installation
      run: |
        rag-memory --version
        python -c "import rag_memory; print('✓ Import successful')"
        python -c "from rag_memory.plugin import register; print('✓ Plugin registration available')"

    - name: Test CLI commands
      run: |
        rag-memory --help
        rag-memory doctor || true

  # Check requirements and security
  check-requirements:
    name: Check Requirements
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install pip-audit safety
        pip install ".[neural]"

    - name: Check for security vulnerabilities with pip-audit
      id: pip-audit
      run: |
        pip-audit --desc --format=json > audit.json || true
        cat audit.json

    - name: Check for security vulnerabilities with safety
      run: |
        safety check --json > safety-report.json || true
        cat safety-report.json

    - name: Check for outdated packages
      id: outdated
      run: |
        pip list --outdated --format=json > outdated.json || true
        cat outdated.json

    - name: Upload security reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          audit.json
          safety-report.json
          outdated.json
        retention-days: 30

  # Code quality checks
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install linting tools
      run: |
        pip install --upgrade pip
        pip install ruff black isort mypy

    - name: Check code formatting with black
      run: |
        black --check src/rag_memory --target-version py311
      continue-on-error: true

    - name: Check import sorting with isort
      run: |
        isort --check-only src/rag_memory

    - name: Lint with ruff
      run: |
        ruff check src/rag_memory --output-format=github

    - name: Type check with mypy
      run: |
        mypy src/rag_memory --ignore-missing-imports

  # Build and verify package
  build-package:
    name: Build Package
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install build tools
      run: |
        pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: |
        python -m build

    - name: Check package with twine
      run: |
        twine check dist/*

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
        retention-days: 7

  # All tests passed - notify
  tests-success:
    name: Tests Success
    runs-on: ubuntu-latest
    needs: [test-python-versions, test-installation, check-requirements, code-quality, build-package]
    if: ${{ success() }}

    steps:
    - name: Create success check
      run: echo "All CI checks passed successfully ✅"
